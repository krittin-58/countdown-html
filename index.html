<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Countdown</title>
<link rel="manifest" href="manifest.json">
<style>
    :root {
        --bg-start: #123;
        --bg-end: #234;
        --fg: #fff;
        --accent: #4f4;
        --danger: #f55;
        --warn: #ff5;
        --panel-bg: #353433;
        --panel-border: #656463;
        --btn-bg: #000;
        --btn-border: #555453;
        --bar-bg: rgba(255,255,255,0.15);
        --bar-fill: #4f4;
    }
    [data-theme="ocean"]  { --bg-start:#011a2e; --bg-end:#023858; --accent:#0bf; --bar-fill:#0bf; }
    [data-theme="sunset"] { --bg-start:#3a0a0a; --bg-end:#8b3a00; --accent:#ffb; --bar-fill:#ffb; }
    [data-theme="forest"] { --bg-start:#0a1a0a; --bg-end:#0d3b1a; --accent:#8f8; --bar-fill:#8f8; }
    [data-theme="purple"] { --bg-start:#1a0a2e; --bg-end:#2d0a58; --accent:#c8f; --bar-fill:#c8f; }
    [data-theme="light"]  {
        --bg-start:#e8ecf0; --bg-end:#d0d8e4; --fg:#111;
        --accent:#0055cc; --danger:#cc2200; --warn:#886600;
        --panel-bg:#dce0e8; --panel-border:#aab0c0;
        --btn-bg:#f4f6ff; --btn-border:#9090a0;
        --bar-bg:rgba(0,0,0,0.12); --bar-fill:#0055cc;
    }

    html, body { height:100%; margin:0; padding:0; overflow:hidden; }
    body {
        background: linear-gradient(to bottom, var(--bg-start), var(--bg-end));
        color: var(--fg);
        font: 18px Cousine, Menlo, Monaco, monospace;
        transition: background 0.5s;
    }

    /* ── Clock ── */
    #clock {
        position: fixed; top: 8px; right: 12px;
        font-size: 18px; color: var(--accent);
        opacity: 0.75; z-index: 200; pointer-events: none;
        user-select: none;
    }

    /* ── Timers grid ── */
    #timers {
        position: fixed; inset: 0;
        display: flex; flex-wrap: wrap;
        align-items: center; justify-content: center;
        gap: 20px; padding: 20px;
        box-sizing: border-box;
    }
    .timer-card {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        flex: 1 1 280px; min-width: 280px; max-width: 560px;
        padding: 16px; box-sizing: border-box;
        border-radius: 6px;
        border: 2px solid transparent;
        transition: border-color 0.2s, opacity 0.15s;
        cursor: pointer;
    }
    .timer-card.active-card { border-color: var(--accent); }
    .timer-card[draggable="true"] { cursor: grab; }
    .timer-card.drag-over { opacity: 0.45; }

    /* Solo timer fills the screen */
    #timers.solo .timer-card { min-width:100%; min-height:80vh; }

    .timer-label {
        font-size: 22px; margin-bottom: 4px;
        color: var(--accent); min-height: 28px;
    }
    .timer-completions {
        font-size: 15px; min-height: 20px; margin-bottom: 4px;
        letter-spacing: 1px; user-select: none;
    }
    .timer-display {
        font-size: clamp(60px, 14vw, 200px);
        line-height: 1.1;
        transition: color 0.3s;
    }
    .timer-display.urgent  { color: var(--danger); font-size: clamp(80px, 20vw, 240px); }
    .timer-display.countup { color: var(--warn);   font-size: clamp(48px, 10vw, 160px); }

    /* Progress bar */
    .progress-track {
        width: 100%; max-width: 480px; height: 8px;
        background: var(--bar-bg); border-radius: 4px;
        margin: 12px 0; overflow: hidden;
    }
    .progress-fill {
        height: 100%; background: var(--bar-fill);
        border-radius: 4px; transition: width 0.2s linear, background 0.3s;
    }
    .progress-fill.urgent { background: var(--danger); }

    /* Timer card buttons */
    .timer-btns { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; justify-content:center; }

    /* Per-timer extras (expandable) */
    .timer-extras {
        display: none; flex-direction: column; align-items: center; gap: 6px;
        margin-top: 8px; padding-top: 8px; width: 100%;
        border-top: 1px solid var(--btn-border);
        font-size: 14px;
    }
    .timer-extras.open { display: flex; }
    .timer-extras label { display:flex; gap:6px; align-items:center; cursor:pointer; }
    .timer-extras select { font-size: 13px; padding: 2px 4px; }

    /* Buttons */
    button, select {
        background: var(--btn-bg);
        border: 1px solid var(--btn-border);
        padding: 4px 8px; margin: 2px;
        color: var(--accent);
        font-family: inherit; font-size: 16px;
        cursor: pointer;
    }
    button:hover, select:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.35; cursor: default; }
    button.tab-active { border-color: var(--accent); background: rgba(255,255,255,0.08); }

    /* Control panel */
    #control {
        position: fixed; top: 20px; left: 20px;
        background: var(--panel-bg);
        border: 2px solid var(--panel-border);
        padding: 8px; z-index: 100;
        transition: opacity 0.15s;
        max-width: min(360px, calc(100vw - 44px));
        max-height: calc(100vh - 44px);
        overflow-y: auto;
        box-sizing: border-box;
    }
    .ctrl-row { display:flex; flex-wrap:wrap; gap:4px; align-items:center; margin-bottom:4px; }

    /* Add form */
    #add-form { margin-top:8px; display:none; }
    #add-form.visible { display:block; }

    .add-tabs { display:flex; gap:4px; margin-bottom:6px; }
    .add-tabs button { font-size:13px; padding:2px 8px; margin:0; }

    #add-form input[type=text],
    #add-form input[type=number],
    #add-form input[type=datetime-local] {
        background:#111; border:1px solid #555; color:#fff;
        font-family:inherit; font-size:15px;
        padding:3px 6px; width:170px; box-sizing:border-box;
    }
    [data-theme="light"] #add-form input[type=text],
    [data-theme="light"] #add-form input[type=number],
    [data-theme="light"] #add-form input[type=datetime-local] {
        background:#fff; border-color:#aaa; color:#111;
    }
    .add-row { margin-top:4px; font-size:14px; }
    .add-row label { display:flex; gap:6px; align-items:center; cursor:pointer; }
    .add-row select { font-size:13px; }

    .preset-btns { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
    .preset-btns button { font-size:13px; padding:2px 6px; margin:0; }
    .preset-del { font-size:10px !important; padding:1px 3px !important; margin-left:-3px !important; }

    /* Sound row */
    #sound-row { display:flex; flex-wrap:wrap; gap:4px; align-items:center; margin-bottom:4px; }
    #sound-row select { font-size:13px; padding:2px 4px; }
    #vol-slider { width:72px; accent-color: var(--accent); cursor:pointer; }

    /* I/O section */
    #io-section { display:none; margin-top:8px; }
    #io-section.open { display:block; }
    #io-textarea {
        width:100%; box-sizing:border-box; height:80px; resize:vertical;
        background:#111; border:1px solid #555; color:#fff;
        font-family:inherit; font-size:12px; padding:4px;
    }
    [data-theme="light"] #io-textarea { background:#fff; color:#111; border-color:#aaa; }

    .form-error { color:var(--danger); font-size:13px; min-height:16px; }

    /* Hidden-controls mode */
    .controls-hidden #control        { opacity:0; pointer-events:none; }
    .controls-hidden .timer-btns     { display:none; }
    .controls-hidden .timer-label    { display:none; }
    .controls-hidden .timer-completions { display:none; }
    .controls-hidden .progress-track { display:none; }
    .controls-hidden #clock          { display:none; }
    .controls-hidden *               { cursor:none !important; }
</style>
<body>
    <div id="clock"></div>
    <div id="timers" onclick="onTimersClick(event)"></div>

    <div id="control">
        <!-- Row 1: add / global actions -->
        <div class="ctrl-row">
            <button onclick="toggleAddForm()">＋ ADD</button>
            <button onclick="pauseAll()">⏸ ALL</button>
            <button onclick="resumeAll()">▶ ALL</button>
            <button onclick="toggleControls()">HIDE</button>
            <button id="btn-fs" onclick="toggleFullscreen()">⛶ FS</button>
        </div>
        <!-- Row 2: theme / notify / share / I/O -->
        <div class="ctrl-row">
            <select id="theme-select" onchange="setTheme(this.value)">
                <option value="">Dark</option>
                <option value="ocean">Ocean</option>
                <option value="sunset">Sunset</option>
                <option value="forest">Forest</option>
                <option value="purple">Purple</option>
                <option value="light">Light</option>
            </select>
            <button id="btn-notify" onclick="requestNotificationPermission()" title="Enable browser notifications">🔔</button>
            <button onclick="shareTimers()" title="Copy shareable URL to clipboard">🔗</button>
            <button onclick="toggleIO()" title="Export / Import JSON">📋</button>
        </div>
        <!-- Row 3: sound settings -->
        <div id="sound-row">
            <button id="btn-mute" onclick="toggleMute()" title="Mute / unmute beep">🔊</button>
            <select id="tone-select" onchange="soundTone=this.value" title="Beep waveform">
                <option value="sine">sine</option>
                <option value="square">square</option>
                <option value="sawtooth">sawtooth</option>
                <option value="triangle">triangle</option>
            </select>
            <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="0.5"
                   oninput="soundVolume=+this.value" title="Volume">
        </div>

        <!-- Add form -->
        <div id="add-form">
            <div class="add-tabs">
                <button id="tab-dur"   class="tab-active" onclick="setAddMode('duration')">⏱ Duration</button>
                <button id="tab-until"                    onclick="setAddMode('until')">📅 Until</button>
            </div>
            <input type="text" id="new-name" placeholder="Name (optional)"><br>
            <div id="mode-duration">
                <input type="number" id="new-minutes" placeholder="Minutes" min="0.1" step="0.5" value="25">
            </div>
            <div id="mode-until" style="display:none">
                <input type="datetime-local" id="new-datetime">
            </div>
            <div style="margin-top:4px; display:flex; gap:4px; flex-wrap:wrap;">
                <button onclick="addTimerFromForm()">▶ START</button>
                <button onclick="savePreset()" title="Save as custom preset">💾 Save</button>
            </div>
            <div class="preset-btns" id="builtin-presets">
                <button onclick="setPreset(5)">5m</button>
                <button onclick="setPreset(10)">10m</button>
                <button onclick="setPreset(15)">15m</button>
                <button onclick="setPreset(25)">25m 🍅</button>
                <button onclick="setPreset(45)">45m</button>
            </div>
            <div id="saved-presets-list" class="preset-btns"></div>
            <div class="add-row">
                <label>Then start: <select id="new-next"><option value="">None</option></select></label>
            </div>
            <div class="add-row">
                <label><input type="checkbox" id="new-repeat"> Auto-repeat 🔁</label>
            </div>
            <div id="add-error" class="form-error"></div>
        </div>

        <!-- Export / Import -->
        <div id="io-section">
            <textarea id="io-textarea" placeholder="Paste JSON here to import, or click EXPORT…"></textarea>
            <div style="display:flex; gap:4px; margin-top:4px; flex-wrap:wrap;">
                <button onclick="exportJSON()">📤 Export</button>
                <button onclick="importJSON()">📥 Import</button>
                <button onclick="toggleIO()">✕</button>
            </div>
            <div id="io-error" class="form-error"></div>
        </div>
    </div>

    <script>
    /* ── State ── */
    var timers = [];
    var nextId = 1;
    var audioCtx = null;
    var activeTimerId = null;
    var wakeLock = null;
    var soundMuted = false;
    var soundTone = 'sine';
    var soundVolume = 0.5;
    var addMode = 'duration';

    /* ── Audio ── */
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return audioCtx;
    }
    function playBeep() {
        if (soundMuted) return;
        try {
            var ctx = getAudioCtx();
            [0, 0.35, 0.7].forEach(function(offset) {
                var osc  = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = soundTone;
                osc.frequency.setValueAtTime(880, ctx.currentTime + offset);
                gain.gain.setValueAtTime(soundVolume, ctx.currentTime + offset);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.3);
                osc.start(ctx.currentTime + offset);
                osc.stop(ctx.currentTime + offset + 0.3);
            });
        } catch(e) {}
    }
    function toggleMute() {
        soundMuted = !soundMuted;
        document.getElementById('btn-mute').textContent = soundMuted ? '🔇' : '🔊';
        try { localStorage.soundMuted = soundMuted ? '1' : '0'; } catch(e) {}
    }

    /* ── Timer model ── */
    function makeTimerFromMs(name, totalMs, opts) {
        opts = opts || {};
        return {
            id: nextId++, name: name || '',
            totalMs: totalMs, remainingMs: totalMs,
            endTime: Date.now() + totalMs,
            isPaused: false, hasFinished: false, hasPlayedSound: false,
            finishedAt: null,
            color:       opts.color       || '',
            repeat:      opts.repeat      || false,
            completions: opts.completions || 0,
            nextTimerId: opts.nextTimerId || null
        };
    }
    function makeTimer(name, minutes, opts) {
        return makeTimerFromMs(name, Math.round(minutes * 60000), opts);
    }
    function getRemaining(t) {
        return t.isPaused ? t.remainingMs : t.endTime - Date.now();
    }
    function findTimer(id) {
        return timers.find(function(x){ return x.id === id; });
    }
    function maxTimerId() {
        var max = 0;
        timers.forEach(function(t){ if (t.id > max) max = t.id; });
        return max;
    }

    /* ── Timer operations ── */
    function pauseTimer(id) {
        var t = findTimer(id);
        if (!t || t.isPaused || t.hasFinished) return;
        t.remainingMs = Math.max(0, t.endTime - Date.now());
        t.isPaused = true;
        saveState();
        syncWakeLock();
    }
    function resumeTimer(id) {
        var t = findTimer(id);
        if (!t || !t.isPaused || t.hasFinished) return;
        t.endTime = Date.now() + t.remainingMs;
        t.isPaused = false;
        saveState();
        syncWakeLock();
    }
    function resetTimer(id) {
        var t = findTimer(id);
        if (!t) return;
        t.remainingMs = t.totalMs;
        t.endTime = Date.now() + t.totalMs;
        t.isPaused = false;
        t.hasFinished = false;
        t.hasPlayedSound = false;
        t.finishedAt = null;
        saveState();
        syncWakeLock();
    }
    function removeTimer(id) {
        if (activeTimerId === id) activeTimerId = null;
        timers = timers.filter(function(x){ return x.id !== id; });
        if (activeTimerId === null && timers.length > 0) activeTimerId = timers[0].id;
        saveState();
        renderCards();
        syncWakeLock();
    }
    function togglePause(id) {
        var t = findTimer(id);
        if (!t) return;
        setActiveTimer(id);
        if (t.isPaused) resumeTimer(id); else pauseTimer(id);
    }
    function pauseAll() {
        timers.forEach(function(t){ pauseTimer(t.id); });
    }
    function resumeAll() {
        timers.forEach(function(t){ if (!t.hasFinished) resumeTimer(t.id); });
    }

    /* ── Active timer (keyboard focus) ── */
    function setActiveTimer(id) {
        activeTimerId = id;
        document.querySelectorAll('.timer-card').forEach(function(c) {
            c.classList.toggle('active-card', +c.dataset.id === id);
        });
    }
    function getActiveTimerObj() {
        if (activeTimerId) {
            var t = findTimer(activeTimerId);
            if (t) return t;
        }
        if (timers.length > 0) { activeTimerId = timers[0].id; return timers[0]; }
        return null;
    }

    /* ── Add mode (duration vs. until-datetime) ── */
    function setAddMode(mode) {
        addMode = mode;
        document.getElementById('mode-duration').style.display = mode === 'duration' ? '' : 'none';
        document.getElementById('mode-until').style.display    = mode === 'until'    ? '' : 'none';
        document.getElementById('tab-dur').classList.toggle('tab-active',   mode === 'duration');
        document.getElementById('tab-until').classList.toggle('tab-active', mode === 'until');
        if (mode === 'until') {
            var d = new Date(Date.now() + 25 * 60000);
            // datetime-local needs local time; adjust for timezone offset
            var local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
            document.getElementById('new-datetime').value = local.toISOString().slice(0, 16);
        }
    }

    /* ── Add form ── */
    function addTimerFromForm() {
        var name   = document.getElementById('new-name').value.trim();
        var repeat = document.getElementById('new-repeat').checked;
        var nextSel = +document.getElementById('new-next').value || null;
        var errEl  = document.getElementById('add-error');
        if (errEl) errEl.textContent = '';
        var ms;
        if (addMode === 'until') {
            var dtVal = document.getElementById('new-datetime').value;
            if (!dtVal) return;
            ms = new Date(dtVal).getTime() - Date.now();
            if (ms <= 0) {
                if (errEl) errEl.textContent = 'Target time must be in the future.';
                return;
            }
        } else {
            var minutes = parseFloat(document.getElementById('new-minutes').value);
            if (!minutes || minutes <= 0) return;
            ms = Math.round(minutes * 60000);
        }
        var t = makeTimerFromMs(name, ms, { repeat: repeat, nextTimerId: nextSel });
        timers.push(t);
        setActiveTimer(t.id);
        saveState();
        renderCards();
        document.getElementById('add-form').classList.remove('visible');
        document.getElementById('new-name').value = '';
        document.getElementById('new-repeat').checked = false;
        document.getElementById('new-next').value = '';
        syncWakeLock();
    }
    function setPreset(m) {
        document.getElementById('new-minutes').value = m;
        setAddMode('duration');
    }
    function toggleAddForm() {
        var visible = document.getElementById('add-form').classList.toggle('visible');
        if (visible) refreshNewNextSelect();
    }

    /* ── "Then start" dropdown (add form) ── */
    function refreshNewNextSelect() {
        var sel = document.getElementById('new-next');
        var cur = sel.value;
        sel.innerHTML = '<option value="">None</option>';
        timers.forEach(function(t) {
            var opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = (t.name || 'Timer #'+t.id) + ' (' + fmtMs(t.totalMs) + ')';
            sel.appendChild(opt);
        });
        sel.value = cur;
    }
    function refreshCardNextSelect(card, t) {
        var sel = card.querySelector('.card-next-sel');
        if (!sel) return;
        var cur = sel.value || (t.nextTimerId ? String(t.nextTimerId) : '');
        sel.innerHTML = '<option value="">None</option>';
        timers.forEach(function(other) {
            if (other.id === t.id) return;
            var opt = document.createElement('option');
            opt.value = other.id;
            opt.textContent = other.name || 'Timer #'+other.id;
            sel.appendChild(opt);
        });
        sel.value = cur;
    }

    /* ── Saved presets ── */
    function getSavedPresets() {
        try { return JSON.parse(localStorage.savedPresets || '[]'); } catch(e) { return []; }
    }
    function savePreset() {
        var name    = document.getElementById('new-name').value.trim();
        var minutes = parseFloat(document.getElementById('new-minutes').value);
        if (!minutes || minutes <= 0) return;
        var presets = getSavedPresets();
        presets.push({ name: name, minutes: minutes });
        try { localStorage.savedPresets = JSON.stringify(presets); } catch(e) {}
        renderSavedPresets();
    }
    function deletePreset(i) {
        var presets = getSavedPresets();
        presets.splice(i, 1);
        try { localStorage.savedPresets = JSON.stringify(presets); } catch(e) {}
        renderSavedPresets();
    }
    function renderSavedPresets() {
        var container = document.getElementById('saved-presets-list');
        container.innerHTML = '';
        getSavedPresets().forEach(function(p, i) {
            var btn = document.createElement('button');
            btn.textContent = (p.name ? p.name + ' ' : '') + p.minutes + 'm';
            btn.onclick = function() {
                document.getElementById('new-name').value = p.name || '';
                setPreset(p.minutes);
            };
            var del = document.createElement('button');
            del.textContent = '✕';
            del.className = 'preset-del';
            del.onclick = function(e) { e.stopPropagation(); deletePreset(i); };
            container.appendChild(btn);
            container.appendChild(del);
        });
    }

    /* ── Rendering helpers ── */
    function escHtml(s) {
        return String(s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    /* Only accept CSS hex colors (#rgb / #rrggbb / #rgba / #rrggbbaa) to prevent injection */
    function sanitizeColor(c) {
        return typeof c === 'string' &&
               /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{4}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(c)
               ? c : '';
    }
    function fmtMs(ms) {
        var m = Math.floor(ms / 60000);
        var s = Math.floor(ms / 1000) % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    /* ── Render all cards ── */
    function renderCards() {
        var container = document.getElementById('timers');
        // Remove stale cards
        var ids = {};
        timers.forEach(function(t){ ids[t.id] = true; });
        container.querySelectorAll('.timer-card').forEach(function(c) {
            if (!ids[+c.dataset.id]) c.remove();
        });
        // Add missing cards, then enforce order
        timers.forEach(function(t) {
            if (!container.querySelector('[data-id="'+t.id+'"]')) {
                container.appendChild(buildCard(t));
            }
        });
        timers.forEach(function(t) {
            container.appendChild(container.querySelector('[data-id="'+t.id+'"]'));
        });
        // Solo mode
        container.classList.toggle('solo', timers.length === 1);
        // Restore active highlight
        if (activeTimerId) setActiveTimer(activeTimerId);
    }

    function buildCard(t) {
        var div = document.createElement('div');
        div.className = 'timer-card' + (t.id === activeTimerId ? ' active-card' : '');
        div.dataset.id = t.id;
        div.setAttribute('draggable', 'true');
        div.addEventListener('click', function(e) {
            if (!e.target.closest('button,input,select')) setActiveTimer(t.id);
        });

        var safeColor  = sanitizeColor(t.color);
        var labelColor = safeColor ? ' style="color:' + safeColor + '"' : '';
        div.innerHTML =
            '<div class="timer-label"' + labelColor + '>' + escHtml(t.name) + '</div>' +
            '<div class="timer-completions"></div>' +
            '<div class="timer-display">--:--</div>' +
            '<div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>' +
            '<div class="timer-btns">' +
                '<button class="btn-pr" onclick="togglePause('+t.id+')">⏸ PAUSE</button>' +
                '<button onclick="resetTimer('+t.id+')">↺ RESET</button>' +
                '<button onclick="removeTimer('+t.id+')">✕</button>' +
                '<button onclick="toggleExtras('+t.id+')" title="Per-timer options">⚙</button>' +
            '</div>' +
            '<div class="timer-extras">' +
                '<label title="Accent colour">🎨 <input type="color" value="' +
                    escHtml(safeColor || '#44ff44') + '" onchange="setTimerColor('+t.id+',this.value)"></label>' +
                '<label><input type="checkbox" class="card-repeat-chk"' +
                    (t.repeat ? ' checked' : '') + ' onchange="setTimerRepeat('+t.id+',this.checked)"> Auto-repeat 🔁</label>' +
                '<label>Then start: <select class="card-next-sel" onchange="setTimerNextId('+t.id+',this.value)"></select></label>' +
            '</div>';
        initCardDrag(div);
        return div;
    }

    function toggleExtras(id) {
        var card = document.querySelector('[data-id="'+id+'"]');
        if (!card) return;
        var extras = card.querySelector('.timer-extras');
        extras.classList.toggle('open');
        if (extras.classList.contains('open')) refreshCardNextSelect(card, findTimer(id));
    }
    function setTimerColor(id, color) {
        var t = findTimer(id);
        if (!t) return;
        t.color = sanitizeColor(color);
        var card = document.querySelector('[data-id="'+id+'"]');
        if (card) {
            var label = card.querySelector('.timer-label');
            label.style.color = t.color || '';
        }
        saveState();
    }
    function setTimerRepeat(id, val) {
        var t = findTimer(id);
        if (t) { t.repeat = val; saveState(); }
    }
    function setTimerNextId(id, val) {
        var t = findTimer(id);
        if (t) { t.nextTimerId = val ? +val : null; saveState(); }
    }

    /* ── Update loop ── */
    function updateCards() {
        timers.forEach(function(t) {
            var card = document.querySelector('[data-id="'+t.id+'"]');
            if (!card) return;
            var remaining = getRemaining(t);
            var justFinished = remaining <= 0 && !t.hasFinished;

            if (justFinished) {
                t.hasFinished = true;
                t.finishedAt  = Date.now();
                if (!t.hasPlayedSound) { t.hasPlayedSound = true; playBeep(); }
                sendNotification(t.name);

                if (t.repeat) {
                    // Auto-restart: count completion and begin again
                    t.completions++;
                    t.remainingMs    = t.totalMs;
                    t.endTime        = Date.now() + t.totalMs;
                    t.isPaused       = false;
                    t.hasFinished    = false;
                    t.hasPlayedSound = false;
                    t.finishedAt     = null;
                } else {
                    // One-shot: count completion, maybe chain
                    t.completions++;
                    if (t.nextTimerId) {
                        var next = findTimer(t.nextTimerId);
                        if (next) resetTimer(t.nextTimerId);
                    }
                }
                saveState();
            }

            /* ── Display ── */
            var displayEl = card.querySelector('.timer-display');
            var fillEl    = card.querySelector('.progress-fill');
            var pauseBtn  = card.querySelector('.btn-pr');
            var compEl    = card.querySelector('.timer-completions');

            // Completions badge
            if (compEl) {
                if (t.completions > 0) {
                    compEl.textContent = t.completions <= 10
                        ? '🍅'.repeat(t.completions)
                        : '🍅×' + t.completions;
                } else {
                    compEl.textContent = '';
                }
            }

            if (t.hasFinished) {
                // Count-up: show elapsed time since finish
                var overMs  = t.finishedAt ? Date.now() - t.finishedAt : 0;
                var overMin = Math.floor(overMs / 60000);
                var overSec = Math.floor(overMs / 1000) % 60;
                displayEl.textContent = '+' + overMin + ':' + overSec.toString().padStart(2, '0');
                displayEl.className = 'timer-display countup';
                fillEl.style.width  = '0%';
                fillEl.className    = 'progress-fill';
            } else {
                var rem    = getRemaining(t);
                var urgent = rem < 60000;
                var mins   = Math.floor(rem / 60000);
                var secs   = Math.floor(rem / 1000) % 60;
                if (urgent) {
                    displayEl.textContent = secs.toString().padStart(2, '0');
                    displayEl.className   = 'timer-display urgent';
                } else {
                    displayEl.textContent = mins + ':' + secs.toString().padStart(2, '0');
                    displayEl.className   = 'timer-display';
                }
                var pct = Math.max(0, Math.min(100, (rem / t.totalMs) * 100));
                fillEl.style.width = pct + '%';
                fillEl.className   = urgent ? 'progress-fill urgent' : 'progress-fill';
            }

            // Pause button state
            if (t.hasFinished) {
                pauseBtn.textContent = '⏸ PAUSE';
                pauseBtn.disabled    = true;
            } else if (t.isPaused) {
                pauseBtn.textContent = '▶ RESUME';
                pauseBtn.disabled    = false;
            } else {
                pauseBtn.textContent = '⏸ PAUSE';
                pauseBtn.disabled    = false;
            }
        });
    }

    /* ── Controls ── */
    function toggleControls() {
        document.body.classList.toggle('controls-hidden');
    }
    function onTimersClick(e) {
        if (e.target.closest && e.target.closest('button')) return;
        var hidden = document.body.classList.contains('controls-hidden');
        if (hidden) {
            document.body.classList.remove('controls-hidden');
        } else if (e.target.classList && e.target.classList.contains('timer-display')) {
            document.body.classList.add('controls-hidden');
        }
    }
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen && document.exitFullscreen();
        }
    }
    document.addEventListener('fullscreenchange', function() {
        document.getElementById('btn-fs').textContent =
            document.fullscreenElement ? '⛶ EXIT FS' : '⛶ FS';
    });

    /* ── Theme ── */
    function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        try { localStorage.theme = theme; } catch(e) {}
    }

    /* ── Persistence helpers ── */
    function timerToState(t) {
        return {
            id: t.id, name: t.name, totalMs: t.totalMs,
            remainingMs: t.isPaused ? t.remainingMs : Math.max(0, t.endTime - Date.now()),
            isPaused: t.isPaused, hasFinished: t.hasFinished, hasPlayedSound: t.hasPlayedSound,
            finishedAt: t.finishedAt,
            color: t.color, repeat: t.repeat, completions: t.completions, nextTimerId: t.nextTimerId
        };
    }
    function stateToTimer(s) {
        var endTime = s.isPaused ? Date.now() : Date.now() + (s.remainingMs || 0);
        return {
            id: s.id, name: s.name || '', totalMs: s.totalMs,
            remainingMs: s.remainingMs || 0,
            endTime: endTime,
            isPaused: !!s.isPaused, hasFinished: !!s.hasFinished, hasPlayedSound: !!s.hasPlayedSound,
            finishedAt: s.hasFinished ? (s.finishedAt || Date.now()) : null,
            color: sanitizeColor(s.color || ''), repeat: !!s.repeat,
            completions: s.completions || 0, nextTimerId: s.nextTimerId || null
        };
    }

    /* ── Save / Load ── */
    function saveState() {
        try {
            localStorage.timersState = JSON.stringify(timers.map(timerToState));
            localStorage.nextId = nextId;
        } catch(e) {}
    }
    function loadState() {
        try {
            var raw = localStorage.timersState;
            if (raw) {
                timers = JSON.parse(raw).map(stateToTimer);
                nextId = +localStorage.nextId || (maxTimerId() + 1);
                return true;
            }
        } catch(e) {}
        return false;
    }

    /* ── URL params ── */
    function handleUrlParams() {
        // Legacy: ?minutes=25&name=foo
        var params = new URLSearchParams(location.search);
        var minutes = parseFloat(params.get('minutes'));
        var name    = params.get('name') || '';
        if (minutes > 0) {
            timers.push(makeTimer(name, minutes));
            saveState();
        }
        // Share hash: #share=<encoded JSON>
        try {
            var hash = location.hash;
            if (hash && hash.startsWith('#share=')) {
                var data = JSON.parse(decodeURIComponent(hash.slice(7)));
                if (Array.isArray(data)) {
                    data.forEach(function(s) {
                        timers.push(makeTimerFromMs(s.name || '', s.totalMs,
                            { color: s.color, repeat: s.repeat }));
                    });
                    saveState();
                }
            }
        } catch(e) {}
    }

    /* ── Backwards compat: old single-endTime format ── */
    function loadLegacy() {
        var endTime = +localStorage.endTime;
        if (!endTime) return false;
        var remaining = endTime - Date.now();
        if (remaining > 0) {
            timers.push({
                id: nextId++, name: '', totalMs: remaining,
                remainingMs: remaining, endTime: endTime,
                isPaused: false, hasFinished: false, hasPlayedSound: false,
                finishedAt: null, color: '', repeat: false, completions: 0, nextTimerId: null
            });
            return true;
        }
        return false;
    }

    /* ── Wake Lock ── */
    function syncWakeLock() {
        var anyRunning = timers.some(function(t){ return !t.isPaused && !t.hasFinished; });
        if (anyRunning && !wakeLock) {
            if (navigator.wakeLock) {
                navigator.wakeLock.request('screen').then(function(lock) {
                    wakeLock = lock;
                    lock.addEventListener('release', function() { wakeLock = null; });
                }).catch(function(){});
            }
        } else if (!anyRunning && wakeLock) {
            wakeLock.release().catch(function(){});
            wakeLock = null;
        }
    }
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') syncWakeLock();
    });

    /* ── Notifications ── */
    function requestNotificationPermission() {
        if (!('Notification' in window)) {
            var btn = document.getElementById('btn-notify');
            if (btn) { btn.textContent = '🔔✗'; btn.title = 'Notifications not supported in this browser'; }
            return;
        }
        Notification.requestPermission().then(function(perm) {
            updateNotifyBtn(perm);
        });
    }
    function updateNotifyBtn(perm) {
        var p = perm || (('Notification' in window) ? Notification.permission : 'default');
        document.getElementById('btn-notify').textContent =
            p === 'granted' ? '🔔✓' : (p === 'denied' ? '🔔✗' : '🔔');
    }
    function sendNotification(name) {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        try {
            new Notification('⏰ Timer Done!', {
                body: (name || 'Timer') + ' has finished.',
                icon: 'icon.svg'
            });
        } catch(e) {}
    }

    /* ── Share / Export / Import ── */
    function shareTimers() {
        var data = timers.map(function(t) {
            return { name: t.name, totalMs: t.totalMs, color: t.color, repeat: t.repeat };
        });
        var url = location.origin + location.pathname +
                  '#share=' + encodeURIComponent(JSON.stringify(data));
        var btn = document.querySelector('[onclick="shareTimers()"]');
        function showCopied() {
            if (btn) {
                var orig = btn.textContent;
                btn.textContent = '✓ Copied';
                setTimeout(function(){ btn.textContent = orig; }, 2000);
            }
        }
        function showFallback() {
            // Display URL in the I/O panel as a fallback
            document.getElementById('io-textarea').value = url;
            document.getElementById('io-section').classList.add('open');
            var errEl = document.getElementById('io-error');
            if (errEl) errEl.textContent = 'Select and copy the share URL above.';
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(showCopied).catch(showFallback);
        } else {
            showFallback();
        }
    }
    function toggleIO() {
        document.getElementById('io-section').classList.toggle('open');
    }
    function exportJSON() {
        document.getElementById('io-textarea').value =
            JSON.stringify(timers.map(timerToState), null, 2);
        var errEl = document.getElementById('io-error');
        if (errEl) errEl.textContent = '';
    }
    function importJSON() {
        var errEl = document.getElementById('io-error');
        if (errEl) errEl.textContent = '';
        try {
            var data = JSON.parse(document.getElementById('io-textarea').value.trim());
            if (!Array.isArray(data)) throw new Error('Expected a JSON array.');
            timers = data.map(stateToTimer);
            nextId = maxTimerId() + 1;
            saveState();
            renderCards();
            document.getElementById('io-section').classList.remove('open');
            syncWakeLock();
        } catch(e) {
            if (errEl) errEl.textContent = 'Import failed: ' + e.message;
        }
    }

    /* ── Drag-to-reorder ── */
    var dragSrcId = null;
    function initCardDrag(card) {
        card.addEventListener('dragstart', function(e) {
            dragSrcId = +card.dataset.id;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(function(){ card.style.opacity = '0.4'; }, 0);
        });
        card.addEventListener('dragend', function() {
            card.style.opacity = '';
            document.querySelectorAll('.timer-card').forEach(function(c){
                c.classList.remove('drag-over');
            });
        });
        card.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', function() {
            card.classList.remove('drag-over');
        });
        card.addEventListener('drop', function(e) {
            e.stopPropagation();
            card.classList.remove('drag-over');
            var targetId = +card.dataset.id;
            if (!dragSrcId || dragSrcId === targetId) return;
            var si = timers.findIndex(function(t){ return t.id === dragSrcId; });
            var ti = timers.findIndex(function(t){ return t.id === targetId; });
            if (si === -1 || ti === -1) return;
            timers.splice(ti, 0, timers.splice(si, 1)[0]);
            dragSrcId = null;
            saveState();
            renderCards();
        });
    }

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', function(e) {
        var tag = document.activeElement && document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

        var t = getActiveTimerObj();
        switch (e.key) {
            case ' ':
            case 'Spacebar':
                e.preventDefault();
                if (t) togglePause(t.id);
                break;
            case 'r': case 'R':
                if (t) resetTimer(t.id);
                break;
            case 'f': case 'F':
                toggleFullscreen();
                break;
            case 'Escape':
                // Close add-form first, then toggle controls
                var af = document.getElementById('add-form');
                if (af.classList.contains('visible')) {
                    af.classList.remove('visible');
                } else {
                    toggleControls();
                }
                break;
            case 'Delete':
                e.preventDefault();
                if (t) removeTimer(t.id);
                break;
            case 'ArrowRight':
                if (timers.length > 1) {
                    e.preventDefault();
                    var ri = timers.findIndex(function(x){ return x.id === activeTimerId; });
                    setActiveTimer(timers[(ri + 1) % timers.length].id);
                }
                break;
            case 'ArrowLeft':
                if (timers.length > 1) {
                    e.preventDefault();
                    var li = timers.findIndex(function(x){ return x.id === activeTimerId; });
                    setActiveTimer(timers[(li - 1 + timers.length) % timers.length].id);
                }
                break;
        }
    });

    /* ── Clock ── */
    function updateClock() {
        var now = new Date();
        var h = now.getHours().toString().padStart(2,'0');
        var m = now.getMinutes().toString().padStart(2,'0');
        var s = now.getSeconds().toString().padStart(2,'0');
        var el = document.getElementById('clock');
        if (el) el.textContent = h + ':' + m + ':' + s;
    }

    /* ── PWA service worker ── */
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js').catch(function(){});
    }

    /* ── Init ── */
    // Theme (saved or system preference)
    try {
        var savedTheme = localStorage.theme;
        if (savedTheme) {
            document.documentElement.dataset.theme = savedTheme;
            document.getElementById('theme-select').value = savedTheme;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            setTheme('light');
            document.getElementById('theme-select').value = 'light';
        }
    } catch(e) {}

    // Sound settings
    try {
        if (localStorage.soundMuted === '1') {
            soundMuted = true;
            document.getElementById('btn-mute').textContent = '🔇';
        }
    } catch(e) {}

    // Timer state
    if (!loadState()) loadLegacy();
    handleUrlParams();

    if (timers.length === 0) {
        document.getElementById('add-form').classList.add('visible');
    }
    if (timers.length > 0) activeTimerId = timers[0].id;

    renderCards();
    renderSavedPresets();
    updateNotifyBtn();
    syncWakeLock();
    setInterval(function() { updateCards(); updateClock(); }, 200);
    </script>

    <script src="smart-tv.js"></script>
</body>
</html>
